spring.application.name=finance-tracker
server.port=8080

# H2 (dev) - FILE mode so data persists across restarts
spring.datasource.url=jdbc:h2:file:./data/financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# 'update' preserves existing data; was 'create-drop' which wiped DB on every restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=ThisIsAVerySecretKeyForFinanceTrackerAppAt256BitsLongOrMore
app.jwt.expiration=86400000

# CORS - all origins that can reach Java directly or via proxy
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4000,http://middleware:4000

# Overrideable via Docker environment
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
